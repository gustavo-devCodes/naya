<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Diário Emocional</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="container">

        <h1>📖 Diário Emocional</h1>

        <p>Como você está se sentindo hoje?</p>

        <select id="humor">

            <option>😀 Muito feliz</option>
            <option>🙂 Bem</option>
            <option>😐 Normal</option>
            <option>😔 Triste</option>
            <option>😰 Ansioso</option>

        </select>

        <br><br>

        <textarea
            id="texto"
            placeholder="Escreva como foi seu dia..."
        ></textarea>

        <br><br>

        <button id="salvar">
            Salvar
        </button>

    </div>

    <script src="../js/diario.js"></script>

</body>

</html>
